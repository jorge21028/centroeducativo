<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Posts - Feria de Innovación</title>
    <link rel="stylesheet" href="stylepost.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="editor-panel">
            <h2><i class="fas fa-edit"></i> Configuración</h2>
            
            <div class="input-group">
                <label>Título del Post</label>
                <input type="text" id="postTitle" placeholder="Ej: Éxito total en la Feria 2026">
            </div>

            <div class="input-group">
                <label>URL Imagen Principal (Frontmatter)</label>
                <input type="text" id="mainImg" placeholder="https://url-de-la-imagen.jpg">
            </div>

            <div class="input-group">
                <label>Introducción (HTML permitido)</label>
                <textarea id="introText" rows="5" placeholder="El pasado viernes, nuestro centro educativo..."></textarea>
            </div>

            <div class="input-group">
                <label>Galería de Imágenes (Máximo 10)</label>
                <div id="galleryInputsContainer">
                    </div>
            </div>

            <div class="actions">
                <button onclick="downloadMarkdown()" class="btn-download">
                    <i class="fas fa-file-download"></i> Descargar .md
                </button>
            </div>
        </aside>

        <main class="preview-panel">
            <div class="preview-header">
                <i class="fas fa-eye"></i> Vista Previa en Tiempo Real
            </div>
            <div id="markdown-render">
                </div>
        </main>
    </div>
    <script src="scriptpost.js"></script>
</body>
</html>
